# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-dockerfile
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base:3.20"
  amd64: "ghcr.io/home-assistant/amd64-base:3.20"
  armhf: "ghcr.io/home-assistant/armhf-base:3.20"
  armv7: "ghcr.io/home-assistant/armv7-base:3.20"
  i386: "ghcr.io/home-assistant/i386-base:3.20"
labels:
  org.opencontainers.image.title: "Home Assistant Add-on: ABS Metadata Server"
  org.opencontainers.image.description: >-
    A metadata server for Audiobookshelf that matches book filenames to records
    in JSON or CSV files and serves cover images.
  org.opencontainers.image.source: "https://github.com/matthewturk/hass-abs-metadata"
  org.opencontainers.image.licenses: "Apache License 2.0"
