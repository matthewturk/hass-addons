# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: ABS Metadata Server
version: "1.0.10"
slug: abs-metadata
description: >-
  A metadata server for Audiobookshelf that matches book filenames to records
  in JSON or CSV files and serves cover images.
url: "https://github.com/matthewturk/hass-abs-metadata/tree/main/abs-metadata"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
apparmor: true
map:
  - media:ro
  - config:ro
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: >-
    Metadata server HTTP port. Enable port forwarding here to expose the server
    to devices beyond the Home Assistant internal network.
options:
  port: 5000
  expose_externally: false
  metadata_sources: ""
  images_dirs: ""
  files_list: ""
  track_missing: false
schema:
  port: int
  expose_externally: bool
  files_list: str
  metadata_sources: str
  images_dirs: str
  track_missing: bool
    #image: "ghcr.io/matthewturk/{arch}-addon-abs-metadata"
