# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: RomM
version: "1.1.0"
slug: romm
description: ROM Manager - A beautiful, powerful, self-hosted ROM management solution
url: "https://github.com/matthewturk/hass-romm"
webui: "http://[HOST]:[PORT:8080]"
arch:
  - aarch64
  - amd64
init: false
boot: manual
ingress: true
ingress_port: 8080
panel: true
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: Web interface (optional if using Ingress)
map:
  - share:rw
  - media:rw
  - homeassistant_config:rw
options:
  db_host: ""
  db_name: "romm"
  db_user: "romm-user"
  db_passwd: ""
  auth_secret_key: ""
  library_path: "/share/romm/library"
  assets_path: "/share/romm/assets"
  screenscraper_user: ""
  screenscraper_password: ""
  retroachievements_api_key: ""
  steamgriddb_api_key: ""
  hasheous_api_enabled: true
schema:
  db_host: "str?"
  db_name: "str"
  db_user: "str"
  db_passwd: "password?"
  auth_secret_key: "password?"
  library_path: "str"
  assets_path: "str"
  screenscraper_user: "str?"
  screenscraper_password: "password?"
  retroachievements_api_key: "password?"
  steamgriddb_api_key: "password?"
  hasheous_api_enabled: "bool"
# Commented out to allow local builds - uncomment when ready to publish
# image: "ghcr.io/matthewturk/{arch}-addon-romm"
