configuration:
  db_host:
    name: Database Host
    description: Hostname or IP address of external MariaDB/MySQL database (leave empty to use SQLite).
  db_name:
    name: Database Name
    description: Name of the database to use.
  db_user:
    name: Database User
    description: Username for database authentication.
  db_passwd:
    name: Database Password
    description: Password for database authentication.
  auth_secret_key:
    name: Authentication Secret Key
    description: Secret key for authentication (leave empty to auto-generate).
  library_path:
    name: Library Path
    description: Path where your ROM library is stored.
  assets_path:
    name: Assets Path
    description: Path where assets (saves, states, etc.) are stored.
  screenscraper_user:
    name: ScreenScraper Username
    description: Username for ScreenScraper metadata provider.
  screenscraper_password:
    name: ScreenScraper Password
    description: Password for ScreenScraper metadata provider.
  retroachievements_api_key:
    name: RetroAchievements API Key
    description: API key for RetroAchievements metadata provider.
  steamgriddb_api_key:
    name: SteamGridDB API Key
    description: API key for SteamGridDB metadata provider.
  hasheous_api_enabled:
    name: Hasheous API Enabled
    description: Enable Hasheous metadata provider.
